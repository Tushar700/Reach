name: ai_life_os
description: AI Personal Life Operating System - Your adaptive life mentor
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend & Auth
  supabase_flutter: ^2.3.0
  flutter_dotenv: ^5.1.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # AI / HTTP
  http: ^1.2.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  logger: ^2.0.2+1

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
